<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CrossianXprep</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#0f0f1a',
                        cardsfc: '#1a1a2e',
                        accentp: '#7c3aed',
                        accentg: '#f59e0b',
                        correct: '#10b981',
                        wrong: '#ef4444',
                        textm: '#e2e8f0'
                    },
                    fontFamily: {
                        pixel: ['"Press Start 2P"', 'cursive'],
                        body: ['"Nunito"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Howler.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

    <style>
        /* Base styles */
        body { margin: 0; overflow: hidden; overscroll-behavior: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pixel-border {
            box-shadow: 
                -4px 0 0 0 white, 4px 0 0 0 white, 
                0 -4px 0 0 white, 0 4px 0 0 white;
            border-radius: 2px;
        }
        .pixel-border-accent {
            box-shadow: 
                -4px 0 0 0 #7c3aed, 4px 0 0 0 #7c3aed, 
                0 -4px 0 0 #7c3aed, 0 4px 0 0 #7c3aed;
             border-radius: 2px;
        }
        
        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .anim-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-5deg); }
            75% { transform: translateX(15px) rotate(5deg); }
        }
        .anim-shake { animation: shake 0.3s ease-in-out; }
        
        @keyframes p-dmg {
            0%, 100% { filter: contrast(1); background-color: transparent; }
            50% { filter: contrast(1.5) drop-shadow(0 0 10px red); background-color: rgba(239,68,68,0.2); }
        }
        .anim-pdmg { animation: p-dmg 0.4s ease-in-out; }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        
        @keyframes scroll-bg {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }
        .bg-pattern {
            background-image: radial-gradient(circle, #7c3aed 1px, transparent 1px);
            background-size: 30px 30px;
            animation: scroll-bg 10s linear infinite;
        }
    </style>
</head>
<body class="bg-appbg text-textm font-body h-screen w-screen relative">
    <div className="absolute inset-0 z-0 bg-pattern opacity-[0.03] pointer-events-none"></div>
    <div id="root" class="absolute inset-0 z-10 flex flex-col"></div>

    <script type="text/babel">
        // ============================================
        // GAME DATA ROOT CONSTANT
        // ============================================
        const GAME_DATA = {
            chapters: [
                {
                    id: 1,
                    title: "Ch.1 — Linear Equations",
                    badge: "Algebria Conqueror 🏆",
                    story: "In the kingdom of Algebria, two merchants are hiding secrets. Merchant X has twice the gold of Merchant Y. Together they carry 90 coins. Your quest: uncover their secrets using the ancient art of Linear Equations.",
                    concepts: [
                        {
                            title: "What is a Linear Equation?",
                            body: "An equation with two unknown values representing a straight line on a graph.",
                            example: "2x + 3y = 12",
                            emoji: "📜"
                        },
                        {
                            title: "Graphical Method",
                            body: "Every equation forms a straight line. The single point where two lines cross is the solution.",
                            example: "Intersection = (X, Y)",
                            emoji: "📈"
                        },
                        {
                            title: "Substitution Method",
                            body: "Isolate one variable in the first equation, then substitute it into the second.",
                            example: "x = 4 - y → 2(4-y) + y = 7",
                            emoji: "🔄"
                        },
                        {
                            title: "Elimination Method",
                            body: "Add or subtract the two equations to completely eliminate one of the variables.",
                            example: "(x+y=10) + (x-y=4) → 2x=14",
                            emoji: "⚔️"
                        }
                    ],
                    miniChallenges: [
                        { q: "If x + y = 10 and x - y = 4, what is x?", options: ["3", "7", "5", "8"], a: 1 },
                        { q: "Which method eliminates a variable by adding two equations?", options: ["Substitution", "Graphical", "Elimination", "Factoring"], a: 2 },
                        { q: "Two lines on a graph intersect at one point. This means the system has:", options: ["No solution", "Infinite solutions", "One unique solution", "Two solutions"], a: 2 }
                    ],
                    boss: {
                        name: "The Equation Beast",
                        maxHp: 100,
                        ascii: `   2x+3y=12 \n  4x      5y \n          6x \n        3y   \n      5x     \n      --     \n      2y     `,
                        questions: [
                            { q: "Solve: 2x + y = 7 and x + y = 4. Find x.", options: ["1", "2", "3", "4"], a: 2 },
                            { q: "If 3x - 2y = 4 and x = 2, find y.", options: ["1", "2", "3", "4"], a: 0 },
                            { q: "Two lines are parallel. The system has:", options: ["One solution", "No solution", "Infinite solutions", "Two solutions"], a: 1 },
                            { q: "The substitution method works by:", options: ["Adding equations", "Graphing both lines", "Replacing one variable", "Multiplying equations"], a: 2 },
                            { q: "Solve: x + 2y = 8 and 2x + 4y = 16. These lines are:", options: ["Intersecting", "Parallel", "The same line", "Perpendicular"], a: 2 }
                        ]
                    }
                }
            ]
        };

        // ============================================
        // SOUND MANAGER
        // ============================================
        const MUTE_AUDIO = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"; // Base64 Silent blip placeholder
        const SOUND_URLS = {
            click: MUTE_AUDIO,
            correct: MUTE_AUDIO,
            wrong: MUTE_AUDIO,
            hit: MUTE_AUDIO,
            damage: MUTE_AUDIO,
            win: MUTE_AUDIO
        };
        
        let sounds = {};
        const initAudio = () => {
            if (Object.keys(sounds).length) return;
            Object.keys(SOUND_URLS).forEach(key => {
                sounds[key] = new Howl({ src: [SOUND_URLS[key]], volume: 0.6 });
            });
        };
        const playSFX = (name) => {
            if (sounds[name]) sounds[name].play();
        };

        // ============================================
        // REACT COMPONENTS
        // ============================================
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Common UI Components ---
        const Button = ({ children, onClick, variant = 'primary', className = '', ...props }) => {
            const base = "font-pixel py-3 px-4 transition-transform active:scale-95 duration-100 flex justify-center items-center text-[10px] md:text-xs text-center leading-loose";
            const variants = {
                primary: "bg-accentp text-white pixel-border-accent hover:brightness-110",
                secondary: "bg-cardsfc text-textm border-2 border-accentp hover:bg-white/10",
                danger: "bg-wrong text-white pixel-border hover:brightness-110 shadow-[0_0_15px_rgba(239,68,68,0.5)]",
                success: "bg-correct text-white pixel-border hover:brightness-110 shadow-[0_0_15px_rgba(16,185,129,0.5)]",
            };
            return (
                <button 
                    className={`${base} ${variants[variant]} ${className}`} 
                    onClick={(e) => { playSFX('click'); onClick && onClick(e); }}
                    {...props}
                >
                    {children}
                </button>
            );
        };

        const Confetti = () => {
            const pieces = useMemo(() => Array.from({length: 60}).map(() => ({
                l: Math.random() * 100,
                d: Math.random() * 2,
                duration: 2 + Math.random() * 3,
                c: ['#7c3aed', '#f59e0b', '#10b981', '#ef4444', '#e2e8f0'][Math.floor(Math.random() * 5)]
            })), []);
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-50">
                    {pieces.map((p, i) => (
                        <div key={i} className="absolute w-2 h-4 rounded-sm" 
                             style={{
                                 left: `${p.l}vw`,
                                 animation: `confetti-fall ${p.duration}s linear ${p.d}s infinite`,
                                 backgroundColor: p.c
                             }}
                        />
                    ))}
                </div>
            )
        };

        // --- Scene 0: Splash Screen ---
        const SplashScene = ({ onStart }) => (
            <motion.div 
                className="flex flex-col items-center justify-center h-full text-center p-4 bg-appbg relative"
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
            >
                <div className="absolute inset-0 bg-pattern opacity-[0.05] pointer-events-none z-0"></div>
                <div className="z-10 flex flex-col items-center">
                    <motion.h1 
                        className="font-pixel text-2xl md:text-5xl text-accentg mb-6 mt-12 leading-loose drop-shadow-md anim-float"
                    >
                        CROSSIANS<br/><span className="text-accentp text-xl md:text-4xl">X</span><br/>PREP
                    </motion.h1>
                    <div className="font-pixel text-textm text-[10px] md:text-sm mb-16 opacity-80 uppercase tracking-widest">
                        Maths World Quest
                    </div>
                    <Button onClick={onStart} className="animate-pulse px-8 py-5 text-sm shadow-[0_0_20px_rgba(124,58,237,0.5)]">PRESS START</Button>
                </div>
            </motion.div>
        );

        // --- Scene 1: Cutscene ---
        const CutsceneScene = ({ text, onNext }) => {
            const [disp, setDisp] = useState("");
            const [done, setDone] = useState(false);
            
            useEffect(() => {
                let i = 0;
                const limit = text.length;
                const int = setInterval(() => {
                    if (i < limit) {
                        setDisp(text.substring(0, i + 1));
                        if(i % 3 === 0) playSFX('click');
                        i++;
                    } else {
                        setDone(true);
                        clearInterval(int);
                    }
                }, 40);
                return () => clearInterval(int);
            }, [text]);

            return (
                <motion.div className="flex flex-col items-center justify-center h-full p-4 md:p-12 relative" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                    <div className="bg-cardsfc max-w-2xl w-full p-6 md:p-8 pixel-border relative z-10 shadow-2xl">
                        <div className="font-pixel text-accentg text-[10px] md:text-xs mb-6 uppercase">Prologue.</div>
                        <p className="font-body text-lg md:text-2xl leading-relaxed min-h-[160px]">
                            {disp}<span className="animate-pulse font-pixel font-bold text-accentp">_</span>
                        </p>
                        {done && (
                            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="mt-8 flex justify-end">
                                <Button onClick={onNext}>Begin Quest &rarr;</Button>
                            </motion.div>
                        )}
                    </div>
                </motion.div>
            );
        };

        // --- Scene 2: Concepts ---
        const ConceptsScene = ({ concepts, onNext }) => {
            const [idx, setIdx] = useState(0);
            return (
                <motion.div className="flex flex-col items-center justify-center h-full p-4 w-full max-w-lg mx-auto" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                    <AnimatePresence mode="wait">
                        <motion.div 
                            key={idx}
                            initial={{ x: 50, opacity: 0 }} animate={{ x: 0, opacity: 1 }} exit={{ x: -50, opacity: 0 }}
                            transition={{ duration: 0.2 }}
                            className="bg-cardsfc w-full rounded-xl p-6 md:p-8 shadow-xl border border-white/10"
                        >
                            <div className="text-5xl mb-6 text-center anim-float drop-shadow-lg">{concepts[idx].emoji}</div>
                            <h2 className="font-pixel text-accentg text-[10px] md:text-xs leading-loose mb-4 text-center">{concepts[idx].title}</h2>
                            <p className="font-body text-base md:text-lg mb-6 text-center opacity-90 leading-relaxed">{concepts[idx].body}</p>
                            <div className="bg-black/30 p-4 rounded text-correct font-pixel text-[10px] md:text-xs text-center overflow-x-auto shadow-inner border border-white/5">
                                {concepts[idx].example}
                            </div>
                        </motion.div>
                    </AnimatePresence>
                    
                    <div className="flex justify-between items-center w-full mt-8">
                        <Button variant="secondary" onClick={() => setIdx(Math.max(0, idx-1))} className={idx === 0 ? "invisible" : ""}>&larr; Prev</Button>
                        <div className="flex gap-2">
                            {concepts.map((_, i) => (
                                <div key={i} className={`w-2 h-2 rounded-full transition-colors ${i === idx ? 'bg-accentg' : 'bg-white/20'}`} />
                            ))}
                        </div>
                        {idx < concepts.length - 1 ? (
                            <Button onClick={() => setIdx(idx+1)}>Next &rarr;</Button>
                        ) : (
                            <Button variant="primary" onClick={onNext} className="animate-pulse shadow-[0_0_10px_rgba(124,58,237,0.5)]">Ready to Fight!</Button>
                        )}
                    </div>
                </motion.div>
            );
        };

        // --- Scene 3 & 4 Shared: Floating Text Particle ---
        const FloatingText = ({ text, color, x, y, onComplete }) => (
            <motion.div 
                className="fixed font-pixel text-base md:text-xl z-50 pointer-events-none w-32 -ml-16 text-center drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]"
                style={{ left: x, top: y, color: color }}
                initial={{ opacity: 1, y: 0, scale: 0.8 }}
                animate={{ opacity: 0, y: -60, scale: 1.2 }}
                transition={{ duration: 1, ease: 'easeOut' }}
                onAnimationComplete={onComplete}
            >
                {text}
            </motion.div>
        );

        // --- Scene 3: Mini Challenges ---
        const MiniChallengeScene = ({ challenges, onComplete, addXp }) => {
            const [qIdx, setQIdx] = useState(0);
            const [floats, setFloats] = useState([]);
            const [shake, setShake] = useState(false);
            const [selIdx, setSelIdx] = useState(null);

            const q = challenges[qIdx];

            const handleAnswer = (e, i) => {
                if (selIdx !== null) return;
                setSelIdx(i);
                
                const rect = e.target.getBoundingClientRect();
                const floatX = rect.left + rect.width / 2;
                const floatY = rect.top;

                if (i === q.a) {
                    playSFX('correct');
                    addXp(10);
                    const fid = Date.now();
                    setFloats(p => [...p, { id: fid, text: "+10 XP", color: '#10b981', x: floatX, y: floatY }]);
                    setTimeout(() => nextQ(), 1000);
                } else {
                    playSFX('wrong');
                    setShake(true);
                    setTimeout(() => setShake(false), 500);
                    setTimeout(() => nextQ(), 1500);
                }
            };

            const nextQ = () => {
                setSelIdx(null);
                if (qIdx < challenges.length - 1) setQIdx(qIdx + 1);
                else onComplete();
            }

            return (
                <motion.div className={`flex flex-col items-center justify-center h-full p-4 max-w-2xl mx-auto w-full ${shake ? 'anim-shake' : ''}`} initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                    {floats.map(f => <FloatingText key={f.id} {...f} onComplete={() => setFloats(p => p.filter(i => i.id !== f.id))} />)}
                    
                    <div className="font-pixel text-accentg text-[10px] md:text-xs mb-8 uppercase tracking-widest drop-shadow">Phase 1: Training</div>
                    
                    <AnimatePresence mode="wait">
                        <motion.div key={qIdx} initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="w-full">
                            <h2 className="font-body font-bold text-lg md:text-2xl mb-8 text-center bg-cardsfc p-6 rounded-lg shadow-lg border border-white/5">{q.q}</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {q.options.map((opt, i) => {
                                    let variant = 'secondary';
                                    if (selIdx !== null) {
                                        if (i === q.a) variant = 'success';
                                        else if (i === selIdx) variant = 'danger';
                                    }
                                    return (
                                        <Button key={i} variant={variant} onClick={(e) => handleAnswer(e, i)} className="h-14 md:h-16 font-body text-sm md:text-base font-bold">
                                            {opt}
                                        </Button>
                                    );
                                })}
                            </div>
                        </motion.div>
                    </AnimatePresence>
                </motion.div>
            );
        };

        // --- Scene 4: Boss Fight ---
        const BossFightScene = ({ boss, onWin, onLose, addXp, playerHp, setPlayerHp, maxPlayerHp }) => {
            const [qIdx, setQIdx] = useState(0);
            const [bossHp, setBossHp] = useState(boss.maxHp);
            const [animState, setAnimState] = useState(''); 
            const [floats, setFloats] = useState([]);
            const [selIdx, setSelIdx] = useState(null);
            
            const dmgAmt = boss.maxHp / boss.questions.length; 

            const handleAnswer = (e, i) => {
                if (selIdx !== null) return; 
                setSelIdx(i);
                const rect = e.target.getBoundingClientRect();
                const q = boss.questions[qIdx];

                if (i === q.a) {
                    playSFX('hit');
                    setAnimState('boss-hit');
                    setBossHp(prev => Math.max(0, prev - dmgAmt));
                    addXp(20);
                    const fid = Date.now();
                    setFloats(p => [...p, { id: fid, text: `-${dmgAmt} HP`, color: '#f59e0b', x: window.innerWidth/2, y: window.innerHeight/3 }]);
                    setTimeout(() => setAnimState(''), 500);
                } else {
                    playSFX('damage');
                    setAnimState('player-hit');
                    setPlayerHp(prev => Math.max(0, prev - 20));
                    setTimeout(() => setAnimState(''), 500);
                }

                setTimeout(() => {
                    setSelIdx(null);
                    if (qIdx < boss.questions.length - 1) {
                         setQIdx(qIdx + 1);
                    } else {
                         if (playerHp > 0) onWin();
                    }
                }, 1500);
            };

            useEffect(() => {
                if (playerHp <= 0) setTimeout(onLose, 1000);
                else if (bossHp <= 0 && playerHp > 0) setTimeout(onWin, 1000);
            }, [playerHp, bossHp]);

            const q = boss.questions[qIdx];

            return (
                <motion.div className={`flex flex-col h-full w-full justify-between pb-4 relative ${animState === 'player-hit' ? 'anim-pdmg anim-shake' : ''}`} initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                    {floats.map(f => <FloatingText key={f.id} {...f} onComplete={() => setFloats(p => p.filter(i => i.id !== f.id))} />)}
                    
                    <div className="flex-1 flex flex-col items-center justify-center relative mt-6 md:mt-12">
                         <div className="font-pixel text-wrong text-[10px] md:text-xs uppercase mb-2 drop-shadow-md">LVL 99 - {boss.name}</div>
                         <div className="w-48 md:w-64 bg-black/60 h-3 rounded-full border border-white/10 mb-6 overflow-hidden shadow-inner">
                             <div className="h-full bg-wrong transition-all duration-[600ms] ease-out shadow-[0_0_10px_rgba(239,68,68,0.8)]" style={{ width: `${(bossHp/boss.maxHp)*100}%`}}></div>
                         </div>
                         <div className={`text-accentg font-pixel drop-shadow-[0_0_20px_rgba(245,158,11,0.5)] ${animState === 'boss-hit' ? 'anim-shake brightness-200' : 'anim-float'}`}>
                             <pre className="text-[10px] md:text-sm leading-tight text-center bg-black/20 p-4 rounded-xl border border-white/5">{boss.ascii}</pre>
                         </div>
                    </div>

                    <div className="w-full max-w-3xl mx-auto px-2 md:px-4">
                        <AnimatePresence mode="wait">
                            <motion.div key={qIdx} initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, scale: 0.95 }} className="bg-cardsfc p-4 md:p-6 rounded-xl border-t-4 border-accentp shadow-[0_-5px_25px_rgba(0,0,0,0.6)]">
                                <div className="font-pixel text-[8px] md:text-[10px] text-accentp mb-3">TURN {qIdx+1} / {boss.questions.length}</div>
                                <h3 className="font-body font-bold text-base md:text-xl mb-4">{q.q}</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 md:gap-3">
                                    {q.options.map((opt, i) => {
                                        let variant = 'secondary';
                                        if (selIdx !== null) {
                                            if (i === q.a) variant = 'success';
                                            else if (i === selIdx) variant = 'danger';
                                        }
                                        return (
                                            <Button key={i} variant={variant} onClick={(e) => handleAnswer(e, i)} className="font-body font-bold text-sm">
                                                {opt}
                                            </Button>
                                        );
                                    })}
                                </div>
                            </motion.div>
                        </AnimatePresence>
                    </div>
                </motion.div>
            );
        };

        // --- Scene 5: Reward Screen ---
        const RewardScene = ({ xp, isWin, onRestart, chapterMap }) => {
            useEffect(() => { if (isWin) playSFX('win'); }, [isWin]);
            
            if (!isWin) {
                 return (
                     <motion.div className="flex flex-col items-center justify-center h-full p-4" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                         <div className="text-6xl mb-6 anim-float grayscale text-center">💀</div>
                         <h1 className="font-pixel text-wrong text-xl md:text-3xl mb-4 text-center">GAME OVER</h1>
                         <p className="font-body mb-8 opacity-80 text-center max-w-sm text-sm md:text-base">
                             The Equation Beast outsmarted you. Review the concepts and try again!
                         </p>
                         <Button onClick={onRestart}>Revive & Retry</Button>
                     </motion.div>
                 );
            }

            let stars = 1;
            if (xp > 80) stars = 2;
            if (xp >= 110) stars = 3;

            return (
                <motion.div className="flex flex-col items-center justify-center h-full p-4 text-center z-20 relative bg-appbg/50" initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }}>
                    <Confetti />
                    <h1 className="font-pixel text-accentg text-lg md:text-3xl mb-3 drop-shadow-[0_0_15px_rgba(245,158,11,0.5)]">CHAPTER COMPLETE!</h1>
                    <div className="font-body font-bold text-lg md:text-xl mb-8 opacity-90">You Mastered:<br/><span className="text-accentp">{chapterMap.title}</span></div>
                    
                    <div className="flex gap-4 mb-8 text-4xl md:text-6xl drop-shadow-lg">
                        {[1,2,3].map(s => (
                            <motion.span key={s} initial={{ opacity: 0, y: -20, rotate: -45, scale: 0 }} animate={{ opacity: 1, y: 0, rotate: 0, scale: 1 }} transition={{ delay: s * 0.3, type: 'spring' }}
                                className={s <= stars ? "text-accentg drop-shadow-[0_0_10px_rgba(245,158,11,0.8)]" : "text-white/10 grayscale"}
                            >
                                ⭐
                            </motion.span>
                        ))}
                    </div>

                    <div className="bg-cardsfc p-4 md:p-6 rounded-xl border border-accentp w-full max-w-sm mb-8 shadow-xl">
                        <div className="flex justify-between items-center bg-black/40 p-3 rounded mb-3 border border-white/5">
                            <span className="font-bold text-sm md:text-base font-body">Total XP:</span>
                            <span className="font-pixel text-correct text-sm">{xp}</span>
                        </div>
                        <div className="flex justify-between items-center bg-black/40 p-3 rounded border border-white/5">
                            <span className="font-bold text-sm md:text-base font-body">Badge Unlocked:</span>
                            <span className="text-[10px] md:text-xs font-pixel text-accentg drop-shadow">{chapterMap.badge}</span>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row gap-4 w-full max-w-md mt-4">
                        <Button variant="secondary" onClick={onRestart} className="flex-1 text-[10px] py-4">Play Again</Button>
                        <Button className="flex-1 opacity-50 cursor-not-allowed group relative py-4" onClick={() => {}} title="Coming Soon">
                            Next Chapter &rarr;
                            <span className="absolute -top-10 scale-0 group-hover:scale-100 transition-transform bg-black text-white text-[10px] px-2 py-1 rounded">Coming Soon</span>
                        </Button>
                    </div>
                </motion.div>
            );
        };

        // --- HUD Components ---
        const HUD = ({ chapterTitle, xp, playerHp, maxPlayerHp }) => (
            <motion.header initial={{ y: -50 }} animate={{ y: 0 }} className="flex-none p-3 md:p-4 flex flex-col md:flex-row justify-between items-center z-30 gap-3 border-b border-white/10 bg-appbg/95 shadow-lg relative">
                <div className="flex items-center justify-between w-full md:w-auto">
                    <div className="flex items-center gap-2">
                        <span className="text-lg drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]">⚔️</span>
                        <span className="font-pixel text-accentg text-[10px] md:text-xs mt-1 drop-shadow uppercase">Hero</span>
                    </div>
                    <div className="md:hidden font-pixel text-[8px] text-textm opacity-70 uppercase tracking-widest">{chapterTitle}</div>
                </div>
                <div className="hidden md:block font-pixel text-[8px] md:text-[10px] text-textm opacity-70 tracking-widest uppercase absolute left-1/2 -translate-x-1/2">{chapterTitle}</div>
                <div className="flex items-center justify-between w-full md:w-auto gap-4">
                    <div className="flex items-center gap-2 flex-1 md:w-40 relative group bg-black/40 p-1 md:p-2 rounded-lg border border-white/5">
                        <span className="text-[10px]">❤️</span>
                        <div className="w-full bg-black/80 h-2 md:h-3 rounded-full border border-white/10 overflow-hidden shadow-inner">
                            <div className="h-full bg-correct transition-all duration-[600ms] ease-out shadow-[0_0_10px_rgba(16,185,129,0.8)]" style={{ width: `${(playerHp/maxPlayerHp)*100}%`}}></div>
                        </div>
                        <span className="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[8px] opacity-0 group-hover:opacity-100 transition-opacity bg-black px-1 rounded border border-white/20 whitespace-nowrap">{playerHp}/{maxPlayerHp} HP</span>
                    </div>
                    <div className="font-pixel text-accentg text-[10px] bg-black/60 border border-white/10 px-3 py-1.5 rounded-lg shadow-inner whitespace-nowrap">XP:{xp}</div>
                </div>
            </motion.header>
        );

        // --- Main App Logic ---
        const App = () => {
            const chapter = GAME_DATA.chapters[0];
            const MAX_HP = 100;
            
            const [scene, setScene] = useState(0); 
            const [xp, setXp] = useState(0);
            const [playerHp, setPlayerHp] = useState(MAX_HP);
            const [isWin, setIsWin] = useState(true);

            useEffect(() => {
                try {
                    const savedXP = localStorage.getItem('cxp_total_xp_v1');
                    if (savedXP) setXp(parseInt(savedXP, 10));
                } catch(e) {}
            }, []);

            const startGame = () => {
                initAudio();
                setScene(1);
            };

            const addXp = (amount) => {
                setXp(p => {
                    const next = p + amount;
                    try { localStorage.setItem('cxp_total_xp_v1', next); } catch(e){}
                    return next;
                });
            };

            const handleBossWin = () => {
                setIsWin(true);
                setScene(5);
            };

            const handleBossLose = () => {
                setIsWin(false);
                setScene(5);
            };

            const restartSession = () => {
                setPlayerHp(MAX_HP);
                setScene(1);
            };

            return (
                <div className="h-full w-full flex flex-col overflow-hidden relative selection:bg-accentp/30">
                    {scene > 0 && <HUD chapterTitle={chapter.title} xp={xp} playerHp={playerHp} maxPlayerHp={MAX_HP} />}
                    
                    <main className="flex-1 relative overflow-y-auto overflow-x-hidden no-scrollbar">
                        <AnimatePresence mode="wait">
                            {scene === 0 && <SplashScene key="s0" onStart={startGame} />}
                            {scene === 1 && <CutsceneScene key="s1" text={chapter.story} onNext={() => setScene(2)} />}
                            {scene === 2 && <ConceptsScene key="s2" concepts={chapter.concepts} onNext={() => setScene(3)} />}
                            {scene === 3 && <MiniChallengeScene key="s3" challenges={chapter.miniChallenges} addXp={addXp} onComplete={() => setScene(4)} />}
                            {scene === 4 && <BossFightScene key="s4" boss={chapter.boss} onWin={handleBossWin} onLose={handleBossLose} addXp={addXp} playerHp={playerHp} setPlayerHp={setPlayerHp} maxPlayerHp={MAX_HP} />}
                            {scene === 5 && <RewardScene key="s5" xp={xp} isWin={isWin} onRestart={restartSession} chapterMap={chapter} />}
                        </AnimatePresence>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
